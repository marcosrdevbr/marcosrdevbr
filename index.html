<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marcos Rogério | Dados & BI</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0b1222;
      color: #f4f7ff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 70px 0;
    }

    .section-title {
      margin-bottom: 18px;
      font-size: 34px;
      font-weight: 700;
    }

    .section-description {
      max-width: 680px;
      margin-bottom: 35px;
      color: #9ca8c0;
      font-size: 20px;
      line-height: 1.7;
    }

    .skills-card {
      padding: 40px;
      background: #121c32;
      border: 1px solid #273653;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

    .skill {
      display: inline-flex;
      align-items: center;
      gap: 14px;

      padding: 18px 26px;

      background: #18243e;
      border: 2px solid #273653;
      border-radius: 18px;

      color: #f4f7ff;
      font-size: 22px;
      text-decoration: none;

      transition: transform 0.25s ease,
                  border-color 0.25s ease,
                  box-shadow 0.25s ease;
    }

    .skill:hover {
      transform: translateY(-5px);
      border-color: #f2c811;
      box-shadow: 0 10px 24px rgba(242, 200, 17, 0.14);
    }

    .skill-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .powerbi {
      color: #f2c811;
    }

    .tableau {
      color: #e97627;
    }

    .sql {
      color: #28a9e0;
    }

    @media (max-width: 650px) {
      .container {
        padding: 40px 0;
      }

      .skills-card {
        padding: 28px 20px;
      }

      .section-title {
        font-size: 28px;
      }

      .section-description {
        font-size: 18px;
      }

      .skills {
        flex-direction: column;
        align-items: flex-start;
      }

      .skill {
        width: 100%;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <section class="skills-card">

      <h1 class="section-title">📊 Dados & BI</h1>

      <p class="section-description">
        Dashboards, análise e tratamento de dados para apoiar decisões.
      </p>

      <div class="skills">

        <a
          class="skill"
          href="https://www.google.com/search?q=Power+BI"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="skill-icon powerbi">◔</span>
          <span>Power BI</span>
        </a>

        <a
          class="skill"
          href="https://www.google.com/search?q=Tableau"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="skill-icon tableau">✣</span>
          <span>Tableau</span>
        </a>

        <a
          class="skill"
          href="https://www.google.com/search?q=SQL"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="skill-icon sql">🛢️</span>
          <span>SQL</span>
        </a>

      </div>

    </section>

  </main>

</body>
</html>
